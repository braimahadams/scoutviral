main{max-width:1100px;margin:0 auto;padding:18px 16px 90px}
h2{font-size:18px;font-weight:600;margin:4px 0 12px}
h3{font-size:13.5px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px}
.muted{color:var(--ink3);font-size:13px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px}

.creator{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;cursor:pointer;position:relative;transition:border-color .12s}
.creator:hover{border-color:var(--accent)}

/* ---------- YouTube API ---------- */
async function yt(endpoint, params){
  if(!apiKey) throw new Error("No API key set. Open Settings — creating your own free key takes 2 minutes, and all usage is billed to your own free Google quota, not this site.");
  const u = new URL("https://www.googleapis.com/youtube/v3/"+endpoint);
  Object.entries(params).forEach(([k,v])=>{ if(v!=="" && v!==undefined && v!==null) u.searchParams.set(k,v); });
  u.searchParams.set("key",apiKey);
  let r;
  try{ r = await fetch(u); }
  catch(e){ throw new Error("Network error reaching YouTube API. Check your connection."); }
  const d = await r.json();
  if(d.error){
    let m = d.error.message || "YouTube API error";
    if(/quota/i.test(m)) m = "Your daily API quota is used up (resets midnight Pacific). Discover searches cost the most — channel scans are cheap.";
    if(/referer|referrer|blocked/i.test(m)) m += " — Tip: in Google Cloud → Credentials, restrict your key to this website's address (recommended), or set restrictions to None.";
    throw new Error(m);
  }
  return d;
}
function parseDur(iso){
  const m=/^PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?$/.exec(iso||""); if(!m) return 0;
  return (+m[1]||0)*3600 + (+m[2]||0)*60 + (+m[3]||0);
}
const fmtN = n => new Intl.NumberFormat("en",{notation:"compact",maximumFractionDigits:1}).format(n);
const fmtD = s => new Date(s).toLocaleDateString(undefined,{year:"numeric",month:"short"});
const esc = s => String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function resolveChannel(c){
  let d;
  if(c.id){ d = await yt("channels",{part:"snippet,statistics,contentDetails", id:c.id}); }
  else{ d = await yt("channels",{part:"snippet,statistics,contentDetails", forHandle:(c.handle||"").replace(/^@/,"")}); }
  if(!d.items || !d.items.length) throw new Error("Channel not found for @"+c.handle+" — check the handle on youtube.com, then edit it here.");
  const it = d.items[0];
  return { id:it.id, title:it.snippet.title, thumb:(it.snippet.thumbnails.medium||it.snippet.thumbnails.default||{}).url||"",
           subs:+(it.statistics.subscriberCount||0), uploads:it.contentDetails.relatedPlaylists.uploads,
           videoCount:+(it.statistics.videoCount||0) };
}
function parseChannelInput(str){
  str = str.trim();
  const ch = str.match(/channel\/(UC[\w-]{10,})/); if(ch) return {id:ch[1]};
  const at = str.match(/@([\w.\-]+)/); if(at) return {handle:at[1]};
  if(/^UC[\w-]{10,}$/.test(str)) return {id:str};
  return {handle:str.replace(/^@/,"")};
}

function sbar(show,text,pct){
  const el=document.getElementById("sbar");
  el.classList.toggle("show",!!show);
  if(text!==undefined) document.getElementById("stext").textContent=text;
  if(pct!==undefined) document.getElementById("sfill").style.width=Math.min(100,pct)+"%";
}
async function scanChannel(meta, depth){
  scan={active:true,cancelled:false};
  const target = Math.min(depth||SCAN_CAP, meta.videoCount||SCAN_CAP, SCAN_CAP);
  let ids=[], page="";
  sbar(true, "Scanning uploads of "+meta.title+"…", 0);
  try{
    do{
      const d = await yt("playlistItems",{part:"contentDetails", playlistId:meta.uploads, maxResults:50, pageToken:page});
      ids = ids.concat((d.items||[]).map(i=>i.contentDetails.videoId));
      page = d.nextPageToken||"";
      sbar(true, "Scanning uploads: "+ids.length.toLocaleString()+" / ~"+target.toLocaleString(), (ids.length/target)*50);
      if(scan.cancelled || ids.length>=target) break;
    }while(page);
    ids = ids.slice(0, target);
    const vids=[];
    for(let i=0;i<ids.length;i+=50){
      if(scan.cancelled) break;
      const d = await yt("videos",{part:"snippet,contentDetails,statistics", id:ids.slice(i,i+50).join(",")});
      (d.items||[]).forEach(it=>{
        vids.push({ id:it.id, title:it.snippet.title, at:it.snippet.publishedAt,
          dur:parseDur(it.contentDetails.duration),
          views:+((it.statistics||{}).viewCount||0), likes:+((it.statistics||{}).likeCount||0),
          thumb:(it.snippet.thumbnails.medium||it.snippet.thumbnails.default||{url:""}).url });
      });
      sbar(true, "Fetching stats: "+Math.min(i+50,ids.length).toLocaleString()+" / "+ids.length.toLocaleString(), 50+(i/ids.length)*50);
    }
    return vids;
  } finally { scan.active=false; sbar(false); }
}

async function discSearch(customQ){
  const c = COUNTRIES[disc.c]||COUNTRIES[0], ni = NICHES[disc.n]||NICHES[0];
  let q = customQ;
  if(!q){
    if(ni.localizable && c.local) q = c.local[0][1];
    else q = ni.q + (c.rc && !ni.localizable ? "" : "");
  }
  const box = document.getElementById("dres");
  box.innerHTML = `<div class="muted" style="padding:14px 2px">Searching “${esc(q)}” ${c.rc?("in "+esc(c.n)):"worldwide"}…</div>`;
  try{
    const params = {part:"snippet", q, type:"video", videoDuration:"short", order:disc.order, maxResults:disc.max};
    if(c.rc) params.regionCode = c.rc;
    if(c.lang) params.relevanceLanguage = c.lang;
    if(disc.when) params.publishedAfter = new Date(Date.now()-(+disc.when)*864e5).toISOString();
    const s = await yt("search",params);
    const ids = (s.items||[]).map(i=>i.id.videoId).filter(Boolean);
    if(!ids.length){ box.innerHTML=`<div class="empty">No results — try another niche, country, or your own query.</div>`; return; }
    const d = await yt("videos",{part:"snippet,contentDetails,statistics", id:ids.join(",")});
    const vids = (d.items||[]).map(it=>({ id:it.id, title:it.snippet.title, ch:it.snippet.channelTitle, chId:it.snippet.channelId,
      at:it.snippet.publishedAt, dur:parseDur(it.contentDetails.duration), views:+((it.statistics||{}).viewCount||0),
      thumb:(it.snippet.thumbnails.medium||{url:""}).url })).filter(v=>v.dur>0 && v.dur<=183).sort((a,b)=>b.views-a.views);
    /* channel aggregation — the "creators you didn't know" layer */
    const chans = {};
    vids.forEach(v=>{ (chans[v.chId]=chans[v.chId]||{name:v.ch,hits:0,top:0}).hits++; chans[v.chId].top=Math.max(chans[v.chId].top,v.views); });
    const chanRow = Object.entries(chans).sort((a,b)=>b[1].top-a[1].top).map(([id,c])=>
      `<span class="qchip" title="Top result: ${fmtN(c.top)} views" onclick="addFromDisc('${id}','${esc(c.name).replace(/'/g,"&#39;")}')">＋ ${esc(c.name)}<small>${c.hits} hit${c.hits>1?"s":""}</small></span>`).join("");
    box.innerHTML = `<h3>Channels in these results — tap to add to your directory</h3><div>${chanRow}</div>
      <h3>Videos</h3><div class="vgrid">` + vids.map(v=>`
      <div class="vid">
        <div class="thumbwrap"><img loading="lazy" src="${esc(v.thumb)}" alt="" onclick="playVid('${v.id}')"><span class="dur">${v.dur}s</span></div>
        <div class="b">
          <div class="t">${esc(v.title)}</div>
          <div class="muted" style="font-size:12px">${esc(v.ch)}</div>
          <div class="m"><span><span class="views">${fmtN(v.views)}</span> views · ${fmtD(v.at)}</span>
          <button class="star ${remakes.some(r=>r.id===v.id)?"on":""}" title="Save to remake list"
            onclick="toggleRemake({id:'${v.id}',title:'${esc(v.title).replace(/'/g,"&#39;")}',thumb:'${esc(v.thumb)}',views:${v.views},ch:'${esc(v.ch).replace(/'/g,"&#39;")}'},this)">★</button></div>
        </div>
      </div>`).join("") + `</div>`;
  }catch(e){ box.innerHTML = `<div class="notice">${esc(e.message)}</div>`; }
}
async function addFromDisc(chId, chName){

  const country = prompt("Which country/region should "+chName+" be filed under?", (COUNTRIES[disc.c]||{}).n||"");

  try{

function scanConfigUI(i, meta, cached){
  const cfg = store.get("ss_scancfg",{n:25,depth:500});
  return `<div class="card" style="margin-bottom:14px">
    <div class="row">
      <label class="muted">Top</label>
      <input type="number" id="topN" min="1" max="1000" value="${cfg.n}" style="width:84px" oninput="updateCost(${i})">
      <label class="muted">Shorts, scanning</label>
      <select id="depth" onchange="updateCost(${i})">
        <option value="500" ${cfg.depth===500?"selected":""}>most recent 500 uploads (fast)</option>
        <option value="1500" ${cfg.depth===1500?"selected":""}>most recent 1,500 uploads</option>
        <option value="${SCAN_CAP}" ${cfg.depth===SCAN_CAP?"selected":""}>full history (up to ${SCAN_CAP.toLocaleString()})</option>
      </select>
      <button class="btn" onclick="doScan(${i})">${cached?"Rescan":"Scan"}</button>
      ${cached?`<button class="btn sec" onclick="exportCSV(${i})">⬇ CSV</button>`:""}
    </div>
    <div class="muted" id="costLine" style="margin-top:7px"></div>
  </div>`;
}
function updateCost(i, meta){
  meta = meta || (creators[i]&&creators[i].meta); if(!meta) return;
  const nEl=document.getElementById("topN"), dEl=document.getElementById("depth"), out=document.getElementById("costLine");
  if(!nEl||!dEl||!out) return;
  const n=+nEl.value||0, depth=Math.min(+dEl.value, meta.videoCount||SCAN_CAP);
  if(n<1){ out.innerHTML=`<span style="color:var(--danger)">Enter at least 1.</span>`; return; }
  if(n>(meta.videoCount||0)){ out.innerHTML=`<span style="color:var(--danger)">This channel only has ${(meta.videoCount||0).toLocaleString()} uploads — lower your number.</span>`; return; }
  const cost = Math.ceil(depth/50)*2;
  out.textContent = `Estimated cost: ~${cost} units of your 10,000 daily quota (${Math.ceil(depth).toLocaleString()} uploads scanned). Deeper scan = truer all-time ranking.`;
}
async function fixHandle(i){
  creators[i].handle = document.getElementById("fixH").value.trim().replace(/^@/,"");
  creators[i].id = null; creators[i].meta = null;
  persist(); renderCreator(i);
}
async function doScan(i){
  const c = creators[i];
  const n = +(document.getElementById("topN")||{}).value || 25;
  const depth = +(document.getElementById("depth")||{}).value || 500;
  if(n<1){ alert("Top N must be at least 1."); return; }
  if(n>(c.meta.videoCount||0)){ alert("This channel only has "+(c.meta.videoCount||0).toLocaleString()+" uploads — choose a smaller number."); return; }
  store.set("ss_scancfg",{n,depth});
  try{
    const vids = await scanChannel(c.meta, depth);
    if(!vids.length){ alert("No videos found (or scan cancelled early)."); return; }
    store.set("ss_vids_"+c.meta.id, {at:Date.now(), depth, vids});
    renderCreator(i);
  }catch(e){ alert(e.message); }
}
function shortsUI(i, cached){
  const c = creators[i];
  const cfg = store.get("ss_scancfg",{n:25,depth:500});
  const maxDur = store.get("ss_maxdur",183);
  const all = cached.vids.filter(v=>v.dur>0 && v.dur<=maxDur).sort((a,b)=>b.views-a.views);
  const shorts = all.slice(0, cfg.n);
  let h = `<div class="filters">
    <span class="muted">Scanned ${cached.vids.length.toLocaleString()} uploads on ${new Date(cached.at).toLocaleDateString()} · ${all.length.toLocaleString()} Shorts found · showing top ${shorts.length}</span>
    <select onchange="store.set('ss_maxdur',+this.value);renderCreator(${i})">
      <option value="183" ${maxDur===183?"selected":""}>Shorts ≤ 3 min</option>
      <option value="60" ${maxDur===60?"selected":""}>Classic ≤ 60s</option>
    </select>
  </div>`;
  if(!shorts.length) return h + `<div class="empty">No Shorts found at this duration/depth — try a deeper scan.</div>`;
  if(cfg.n > all.length) h += `<div class="muted" style="margin-bottom:10px">Only ${all.length} Shorts exist in the scanned range — showing all of them.</div>`;
  h += `<div class="vgrid">` + shorts.map((v,r)=>vidCard(v,r+1,c.meta.title)).join("") + `</div>`;
  return h;
}
function vidCard(v, rank, channelTitle){

  return `<div class="vid">
    <div class="thumbwrap">
      ${rank?`<span class="rank">#${rank}</span>`:""}
      <img loading="lazy" src="${esc(v.thumb)}" alt="" onclick="playVid('${v.id}')">
      <span class="dur">${v.dur}s</span>
    </div>
    <div class="b">
      <div class="t">${esc(v.title)}</div>
      <div class="m">
        <span><span class="views">${fmtN(v.views)}</span> views · ${fmtD(v.at)}</span>
        <button class="star ${starred?"on":""}" title="Save to remake list"
          onclick="toggleRemake({id:'${v.id}',title:'${esc(v.title).replace(/'/g,"&#39;")}',thumb:'${esc(v.thumb)}',views:${v.views},ch:'${esc(channelTitle).replace(/'/g,"&#39;")}'},this)">★</button>

function exportCSV(i){
  const c=creators[i]; const cached=store.get("ss_vids_"+c.meta.id,null); if(!cached) return;
  const cfg = store.get("ss_scancfg",{n:25});
  const maxDur = store.get("ss_maxdur",183);
  const shorts = cached.vids.filter(v=>v.dur>0&&v.dur<=maxDur).sort((a,b)=>b.views-a.views).slice(0,cfg.n);
  const q = s=>'"'+String(s).replace(/"/g,'""')+'"';
  const rows = [["rank","title","url","views","likes","published","duration_s"].join(",")]
    .concat(shorts.map((v,r)=>[r+1,q(v.title),"https://www.youtube.com/shorts/"+v.id,v.views,v.likes,v.at,v.dur].join(",")));
  const blob = new Blob(["\uFEFF"+rows.join("\n")],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=c.meta.title.replace(/[^\w\- ]+/g,"")+"-top-shorts.csv"; a.click();
}

/* ---------- Remake list ---------- */
function toggleRemake(v, btn){
  const ix = remakes.findIndex(r=>r.id===v.id);
  if(ix>=0){ remakes.splice(ix,1); if(btn) btn.classList.remove("on"); }
  else{ remakes.unshift({...v, added:Date.now()}); if(btn) btn.classList.add("on"); }
  persist();
  if(route.v==="remake") renderRemake();
}
function renderRemake(){
  let h = `<h2>Remake list</h2><div class="muted" style="margin-bottom:12px">Concepts you've starred to re-film in your own style. ${fb&&!user?'<b>Sign in</b> (top right) to keep this list synced across devices.':""}</div>`;
  if(!remakes.length){ view().innerHTML = h + `<div class="empty">Nothing saved yet — hit the ★ on any video.</div>`; return; }
  h += `<div class="vgrid">` + remakes.map(v=>`
    <div class="vid">
      <div class="thumbwrap"><img loading="lazy" src="${esc(v.thumb)}" alt="" onclick="playVid('${v.id}')"></div>
      <div class="b">
        <div class="t">${esc(v.title)}</div>
        <div class="muted" style="font-size:12px">${esc(v.ch||"")}</div>
        <div class="m"><span><span class="views">${fmtN(v.views||0)}</span> views</span>
          <button class="star on" onclick="toggleRemake({id:'${v.id}'})">★</button></div>
      </div>
    </div>`).join("") + `</div>`;
  view().innerHTML = h;
}

/* ---------- player ---------- */
function playVid(id){
  document.getElementById("modal").innerHTML = `
  <div class="overlay" onclick="if(event.target===this)closeVid()">
    <div class="player">
      <button class="closex" onclick="closeVid()">×</button>
      <iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>`;
}
function closeVid(){ document.getElementById("modal").innerHTML=""; }
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeVid(); });

/* ---------- Settings ---------- */
function renderSet(){
  const nCache = (()=>{ let n=0; for(let i=0;i<localStorage.length;i++){ if((localStorage.key(i)||"").startsWith("ss_vids_")) n++; } return n; })();
  view().innerHTML = `<h2>Settings</h2>
  <div class="card" style="margin-bottom:12px">
    <b>Your YouTube Data API v3 key</b>
    <div class="row" style="margin-top:8px">
      <input type="password" id="keyIn" value="${esc(apiKey)}" placeholder="Paste your API key">
      <button class="btn" onclick="saveKey()">Save</button>
    </div>
    <div class="muted" style="margin-top:7px">Your key is stored only in this browser and sent only to Google's YouTube API — never to this site's servers. All usage counts against your own free Google quota.</div>
  </div>
  <div class="bk"><details ${apiKey?"":"open"}><summary>Get a free API key (2 minutes)</summary><div class="in"><ol>
    <li>Go to <a href="https://console.cloud.google.com/" target="_blank" rel="noopener">console.cloud.google.com</a> and create a project (or reuse one).</li>
    <li>APIs &amp; Services → <b>Library</b> → search “YouTube Data API v3” → <b>Enable</b>.</li>
    <li>APIs &amp; Services → <b>Credentials</b> → Create credentials → <b>API key</b>.</li>
    <li><b>Recommended:</b> click the key → Application restrictions → Websites → add this site's address. That locks your key so it only works here.</li>
    <li>Paste it above. Free quota: 10,000 units/day — Discover searches cost ~100, channel scans ~2 per 100 videos.</li>
  </ol></div></details></div>
  <div class="card" style="margin-bottom:12px">
    <b>Data</b>
    <div class="muted" style="margin:6px 0 10px">${creators.length} creators · ${remakes.length} remake saves · ${nCache} channels cached on this device ${user?`· synced to ${esc(user.email||"your account")}`:""}</div>
    <div class="row">
      <button class="btn sec" onclick="exportAll()">⬇ Backup (JSON)</button>
      <button class="btn sec" onclick="document.getElementById('impF').click()">⬆ Restore backup</button>
      <input type="file" id="impF" accept=".json" style="display:none" onchange="importAll(this)">
      <button class="btn sec" onclick="clearCaches()">Clear video caches</button>
    </div>
  </div>
  <div class="muted">Videos play through YouTube's official embedded player — the views you generate count for the creators. There's deliberately no downloader: ripping videos breaks YouTube's terms, and re-uploaded footage gets demonetized as reused content anyway. The play is re-filming the <i>concept</i> in your own style.</div>`;
}
function saveKey(){ apiKey = document.getElementById("keyIn").value.trim(); store.set("ss_key",apiKey); alert(apiKey?"Key saved ✓":"Key cleared"); }
function clearCaches(){
  const keys=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith("ss_vids_")) keys.push(k); }
  keys.forEach(k=>localStorage.removeItem(k)); renderSet();
}
function exportAll(){
  const data = {creators, remakes, exported:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="creator-scout-backup.json"; a.click();
}
function importAll(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{
    const d = JSON.parse(r.result);
    if(d.creators) creators = d.creators;
    if(d.remakes) remakes = d.remakes;
    persist(); alert("Backup restored ✓"); render();
  }catch(e){ alert("Couldn't read that file."); } };
  r.readAsText(f);
}

/* ---------- init ---------- */
render();
</script>
<script type="module">
/* Optional Firebase layer — activates only when config.js is filled in */
try{
  const cfg = window.FIREBASE_CONFIG;
  if(!cfg || !cfg.apiKey || cfg.apiKey.startsWith("PASTE")){ window.onFirebaseReady(null); }
  else{
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const { getFirestore, doc, getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const app = initializeApp(cfg);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window.onFirebaseReady({
      signIn: ()=>signInWithPopup(auth, new GoogleAuthProvider()),
      signOut: ()=>signOut(auth),
      onUser: (cb)=>onAuthStateChanged(auth, cb),
      load: async(uid)=>{ const s = await getDoc(doc(db,"users",uid)); return s.exists()? s.data() : null; },
      save: (uid,data)=>setDoc(doc(db,"users",uid), data, {merge:true}),
    });
  }
}catch(e){ console.warn("Firebase init failed:", e.message); window.onFirebaseReady(null); }
</script>
</body>
</html>
