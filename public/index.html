}

/* ---------- Scout Score (background ranking: how worth studying a creator is) ---------- */
function _clamp(x,a,b){ return Math.max(a, Math.min(b, x)); }
function scoutScore(vids){
  const maxDur = store.get("ss_maxdur",183);
  const S = (vids||[]).filter(v=>v.dur>0 && v.dur<=maxDur && v.views>0);
  const n = S.length;
  if(n < 3) return null;                                   // too little data to judge
  const sv = S.map(v=>v.views).sort((a,b)=>a-b);
  const median = sv[Math.floor(sv.length/2)] || 1;
  /* 1. Hit rate (most important) — share of Shorts that ≥2× their own median (breakout ideas) */
  const hits = S.filter(v=>v.views >= 2*median).length;
  const fHit = _clamp((hits/n)/0.30, 0, 1);
  /* 2. Reach — median views on a log scale (~1K … 10M) */
  const fReach = _clamp((Math.log10(median+1)-3)/4, 0, 1);
  /* 3. Engagement — average like/view rate (neutral if a channel hides likes) */
  const withLikes = S.filter(v=>v.likes>0);
  let fEng = 0.5;
  if(withLikes.length >= Math.max(3, n*0.3)){
    const eng = withLikes.reduce((s,v)=>s + v.likes/v.views, 0) / withLikes.length;
    fEng = _clamp(eng/0.06, 0, 1);
  }
  /* 4. Consistency — output cadence (Shorts per month across their active span) */
  const t = S.map(v=>+new Date(v.at)).sort((a,b)=>a-b);
  const spanMonths = Math.max(1, (t[t.length-1]-t[0]) / (30*864e5));
  const fCons = _clamp((n/spanMonths)/6, 0, 1);
  /* 5. Freshness — still posting, and recent Shorts still landing */
  const now = Date.now();
  const recency = _clamp(1 - ((now - t[t.length-1])/864e5)/180, 0, 1);
  const recent = S.filter(v=> (now - +new Date(v.at))/864e5 <= 120);
  let perf = recency;
  if(recent.length){
    const rv = recent.map(v=>v.views).sort((a,b)=>a-b);
    perf = _clamp((rv[Math.floor(rv.length/2)]||0)/median, 0, 1);
  }
  const fFresh = 0.5*recency + 0.5*perf;
  const score = Math.round(_clamp(100*(0.35*fHit + 0.20*fReach + 0.15*fEng + 0.15*fCons + 0.15*fFresh), 0, 100));
  return { score, n };
}
function scoutTier(s){ return s>=75 ? "good" : s>=50 ? "mid" : "low"; }
function scoutVerdict(s){
  if(s>=85) return "Elite — study this one closely";
  if(s>=70) return "Strong — plenty worth studying";
  if(s>=55) return "Solid — real ideas to borrow";
  if(s>=40) return "Mixed — dig for the standouts";
  return "Low signal — a few gems at best";
}
function scoreCardUI(cached){
  const s = scoutScore(cached.vids); if(!s) return "";
  const t = scoutTier(s.score);
  return `<div class="scorecard">
    <div class="scoreval tier-${t}">${s.score}<span>/100</span></div>
    <div class="scoremeta">
      <div class="scorelabel">Scout Score</div>
      <div class="muted">${scoutVerdict(s.score)} · from ${s.n.toLocaleString()} Shorts</div>
    </div>
  </div>`;
}

function scanDepth(){

function updateCost(i, meta){

/* rank a creator's Shorts by raw reach (views) or by engagement (likes ÷ views).
   Videos with hidden likes fall to the bottom of an engagement ranking. */
function engRatio(v){ return (v.likes>0 && v.views>0) ? v.likes/v.views : -1; }
function rankVids(vids, by){
  const arr=[...vids];
  if(by==="engagement") arr.sort((a,b)=> engRatio(b)-engRatio(a) || b.views-a.views);
  else arr.sort((a,b)=> b.views-a.views);
  return arr;
}
function shortsUI(i, cached){

  if(!all.length) return `<div class="empty">No Shorts at this length — try a wider Scout range, or switch to Shorts ≤ 3 min.</div>`;
  const counts={new:0,saved:0,remaking:0,completed:0,skipped:0}; all.forEach(v=>counts[vStat(v.id)]++);
  const shown = all.filter(v=>vFilterMatch(vFilter, vStat(v.id)));
  const capped = (vFilter==="active"||vFilter==="new"||vFilter==="all");
  const list = capped ? shown.slice(0, cfg.n) : shown;
  const autoplay = !(vFilter==="completed"||vFilter==="skipped");
  let h = vFilterBarHTML(i, counts, all.length);
  h += `<div class="filters" style="margin-bottom:12px">

}

async function vSetCreator(i, id, s){

/* ---------- Board: Saved -> Remaking -> Completed (global, from the library) ---------- */
let libFilter = "saved";  // saved | remaking | completed
let libGroup = null;      // active collection filter (null=all, "__none__"=unsorted, or a name)
let _grpNames = [];       // current tab's collection names, referenced by index from onclick
async function vSetById(id, s){
  const e=library[id]; if(!e) return;
  if(s==="completed" && e.s!=="completed" && !(await confirmCompleted(id))) return;
  vSet({id, title:e.t, thumb:e.th, views:e.v, ch:e.ch, at:e.at, dur:e.d}, s);

}
/* marking Completed is the finish line — a small confirm makes it feel earned */
function confirmCompleted(id){
  const hasNote = !!(library[id]&&library[id].n);
  return uiConfirm(
    hasNote ? "Nice work! It moves to Completed, and your production notes stay with it."
            : "Nice work! It moves to Completed, where you can always find it.",
    {title:"Mark as completed?", okText:"Yes, it's done"});

function renderRemake(){
  const byStat = st => Object.entries(library).filter(([id,e])=>e.s===st);
  const saved     = byStat("saved");
  const remaking  = byStat("remaking");
  const completed = byStat("completed");
  const src = libFilter==="remaking"?remaking : libFilter==="completed"?completed : saved;
  const autoplay = libFilter!=="completed";
  const heading = libFilter==="remaking"?"Remaking" : libFilter==="completed"?"Completed" : "Saved ideas";
  const sub = libFilter==="remaking"?"Ideas you're actively working on — plan them, note what you need, and film."
    :libFilter==="completed"?"Videos you've finished and posted — kept as your track record."
    :"Your inspiration board. Ready to make one? Start remaking it.";

  /* Collections (Saved + Remaking only): ad-hoc, user-made folders like "Gym" or
     "Park" so you can zero in on what you're able to film right now. A filed idea
     lives ONLY in its collection — it leaves the "All" (loose) pile — so every
     idea sits in exactly one place and the bucket counts add up to the tab total.
     Collections are derived purely from the `g` tags present, so an emptied one
     just disappears; no category to delete by hand. */
  const groupsOn = libFilter!=="completed";
  const grpCounts={}; let loose=0;
  if(groupsOn) src.forEach(([,e])=>{ const g=(e.g||"").trim(); if(g) grpCounts[g]=(grpCounts[g]||0)+1; else loose++; });
  _grpNames = Object.keys(grpCounts).sort((a,b)=>a.localeCompare(b));
  // libGroup: null = "All" (loose/unfiled), or a collection name. Reset a filter
  // whose collection just emptied so the view never lands on a dead bucket.
  if(libGroup && !grpCounts[libGroup]) libGroup=null;

  let list = src.map(([id,e])=>({id,...e}));
  if(groupsOn) list = list.filter(v=> libGroup ? (v.g||"").trim()===libGroup : !((v.g||"").trim()));
  const active = list.sort((a,b)=>(b.u||0)-(a.u||0));

  let h = `<h2>${heading}</h2>
  <div class="muted" style="margin-bottom:14px">${sub} ${fb&&!user?'<b>Sign in</b> (top right) to sync across devices.':""}</div>
  <div class="boardtabs">
    ${[["saved","star","Saved",saved.length],["remaking","clapper","Remaking",remaking.length],["completed","check","Completed",completed.length]]
      .map(([f,ic,nm,n])=>`<button class="btab ${libFilter===f?"on":""}" onclick="libFilter='${f}';libGroup=null;renderRemake()">
        <span class="btab-ic">${ico(ic)}</span><span class="btab-n">${nm}</span><span class="btab-c">${n}</span></button>`).join("")}
  </div>`;
  if(groupsOn && _grpNames.length){
    h += `<div class="grplabel">Collections</div>
    <div class="grpbar">
      <button class="grp-fchip ${!libGroup?"on":""}" onclick="setLibGroup(null)">All <small>${loose}</small></button>
      ${_grpNames.map((n,gi)=>`<button class="grp-fchip ${libGroup===n?"on":""}" onclick="setLibGroup(_grpNames[${gi}])">${ico("folder")} ${esc(n)} <small>${grpCounts[n]}</small></button>`).join("")}
    </div>`;
  }
  if(!active.length){
    const emptyMsg = libGroup ? "Nothing in this collection right now."
      : (groupsOn && _grpNames.length) ? "Everything here is filed into a collection above — tap one to open it."
      : libFilter==="remaking"?"Nothing in progress yet — open a saved idea and tap Start remaking."
      : libFilter==="completed"?"Nothing completed yet. Finish a remake and mark it done to build your track record."
      : "Nothing saved yet — tap the star on any video in Discover or on a creator's page.";
    view().innerHTML = h + `<div class="empty">${emptyMsg}</div>`; return;
  }
  h += `<div class="vgrid">` + active.map(v=>{
    const twOpen = autoplay ? `<div class="thumbwrap" data-vid="${v.id}">` : `<div class="thumbwrap">`;
    const grpBtn = groupsOn ? `<button class="act" title="Move to a collection" onclick="groupPicker('${v.id}')">${ico("folder")}</button>` : "";
    const acts =
      v.s==="saved" ?
        `<button class="act" title="Start remaking" onclick="vSetById('${v.id}','remaking')">${ico("clapper")}</button>
         ${grpBtn}
         <button class="act" title="Production notes" onclick="editNote('${v.id}')">${ico("pencil")}</button>
         <button class="act" title="Remove from board" onclick="vSetById('${v.id}','saved')">${ico("x")}</button>`
      : v.s==="remaking" ?
        `<button class="act" title="Mark completed" onclick="vSetById('${v.id}','completed')">${ico("check")}</button>
         ${grpBtn}
         <button class="act" title="Production notes" onclick="editNote('${v.id}')">${ico("pencil")}</button>
         <button class="act" title="Back to Saved" onclick="vSetById('${v.id}','saved')">${ico("undo")}</button>`
      :
        `<button class="act" title="Reopen (back to Remaking)" onclick="vSetById('${v.id}','remaking')">${ico("undo")} Reopen</button>
         <button class="act" title="Production notes" onclick="editNote('${v.id}')">${ico("pencil")}</button>`;
    return `<div class="vid tall" data-card="${v.id}">
      ${twOpen}
        <img loading="lazy" src="${esc(v.th)}" alt="${esc(v.t)}" onclick="playVid('${v.id}')">
        ${v.d?`<span class="dur">${v.d}s</span>`:""}
        <button class="expand" title="Open with sound" onclick="event.stopPropagation();playVid('${v.id}')">${ico("expand")}</button>
      </div>
      <div class="b">
        <div class="t">${esc(v.t)}</div>
        <div class="muted" style="font-size:12px">${esc(v.ch||"")}</div>
        ${(groupsOn && (v.g||"").trim())?`<button class="vgroup" title="Change collection" onclick="groupPicker('${v.id}')">${ico("folder")} ${esc(v.g.trim())}</button>`:""}
        <div class="acts">${acts}</div>
        ${noteHTML(v.id)}
        <button class="cp" onclick="copyLink('${v.id}',this)">${ico("link")} Copy link</button>
      </div>
    </div>`;
  }).join("") + `</div>`;
  view().innerHTML = h;
  if(autoplay) observePreviews();
}
function setLibGroup(g){ libGroup = g; renderRemake(); }   // null = All (loose), or a collection name
/* collection picker — existing collections as one-tap chips + a "new" field.
   Assigning to a fresh name creates it; emptying one lets it vanish on its own. */
function groupPicker(id){
  const e=library[id]; if(!e) return;
  const all={}; Object.values(library).forEach(x=>{ const g=(x.g||"").trim(); if(g) all[g]=(all[g]||0)+1; });
  const names=Object.keys(all).sort((a,b)=>a.localeCompare(b));
  const cur=(e.g||"").trim();
  const chips = names.length
    ? names.map(n=>`<button class="grp-chip ${n===cur?"on":""}" onclick="setGroup('${esc(id)}',this.dataset.g)" data-g="${esc(n)}">${esc(n)} <small>${all[n]}</small>${n===cur?ico("check"):""}</button>`).join("")
    : `<div class="muted" style="font-size:13px">No collections yet — make your first one below.</div>`;
  document.getElementById("modal").innerHTML = `
  <div class="overlay dlg" onclick="if(event.target===this)closeGroup()">
    <div class="card dlgbox" role="dialog" aria-modal="true">
      <div class="dlgtitle">Move to a collection</div>
      <div class="dlgmsg">Group ideas by what you need to film them — a place, a prop, a moment. Pick one, or make a new one. When a collection empties, it disappears on its own.</div>
      <div class="grp-chips">${chips}</div>
      <div class="row" style="margin-top:14px">
        <input type="text" id="grpNew" placeholder="New collection — e.g. Gym, Park, Kitchen" onkeydown="if(event.key==='Enter'){event.preventDefault();setGroupNew('${esc(id)}')}">
        <button class="btn" onclick="setGroupNew('${esc(id)}')">Add</button>
      </div>
      ${cur?`<button class="grp-remove" onclick="setGroup('${esc(id)}','')">${ico("x")} Take out of “${esc(cur)}”</button>`:""}
    </div>
  </div>`;
  setTimeout(()=>{ const el=document.getElementById("grpNew"); if(el) el.focus(); },30);
}
function setGroup(id, g){
  const e=library[id]; if(!e) return;
  g=(g||"").trim();
  if(g) e.g=g; else delete e.g;
  e.u=Date.now();                               // touch so the tag rides the newest-wins sync merge
  persist(); closeGroup(); renderRemake();
}
function setGroupNew(id){ const el=document.getElementById("grpNew"); if(el) setGroup(id, el.value); }
function closeGroup(){ document.getElementById("modal").innerHTML=""; }

/* ---------- inline preview: muted autoplay while on-screen, stop when scrolled past ---------- */
let _io = null;
function startPreview(el){
  if(!el || el.querySelector("iframe.prev")) return;
  const id = el.dataset.vid; if(!id) return;
  el.classList.add("playing");
  el.insertAdjacentHTML("beforeend", `<iframe class="prev" src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&controls=0&modestbranding=1&rel=0&playsinline=1" allow="autoplay; encrypted-media"></iframe>`);
}
function stopPreview(el){
  if(!el) return;
  const f = el.querySelector("iframe.prev"); if(f) f.remove();
  el.classList.remove("playing");
}
function observePreviews(){
  stopAllPreviews();
  const cards = document.querySelectorAll(".vid.tall .thumbwrap[data-vid]");
  if(!("IntersectionObserver" in window)){ cards.forEach(startPreview); return; } // fallback: play all
  _io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) startPreview(e.target); else stopPreview(e.target); });
  }, {threshold:0.5});
  cards.forEach(el=>_io.observe(el));
}
function stopAllPreviews(){
  if(_io){ _io.disconnect(); _io = null; }
  document.querySelectorAll("iframe.prev").forEach(f=>{
    const w = f.closest(".thumbwrap"); f.remove(); if(w) w.classList.remove("playing");
  });
}

/* ---------- player ---------- */
const validVid = id => /^[A-Za-z0-9_-]{6,15}$/.test(id||"");   // guards the shared-link param that flows into the iframe src
function playVid(id){

}

document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ if(_dlgState){ _dlgCancel(); return; } closeVid(); closeAuthModal(); } });

/* ---------- Custom dialogs (branded replacements for alert/confirm/prompt) ---------- */
let _dlgState = null;
function _dlgFinish(val){
  const st = _dlgState; _dlgState = null;
  document.getElementById("dialog").innerHTML = "";
  if(st) st.resolve(val);
}
function _dlgOk(){ const st=_dlgState; if(!st) return; _dlgFinish(st.input ? (document.getElementById("dlgInput")?.value ?? "") : true); }
function _dlgCancel(){ const st=_dlgState; if(!st) return; _dlgFinish(st.input ? null : false); }
function _showDlg(cfg){
  return new Promise(resolve=>{
    if(_dlgState) _dlgFinish(_dlgState.input ? null : false); // resolve any prior dialog as cancel
    _dlgState = {resolve, input:!!cfg.input};
    const okStyle = cfg.danger ? ' style="background:var(--danger)"' : "";
    document.getElementById("dialog").innerHTML = `
    <div class="overlay dlg" onclick="if(event.target===this)_dlgCancel()">
      <div class="card dlgbox" role="dialog" aria-modal="true" ${cfg.title?'aria-labelledby="dlgTitle"':""}>
        ${cfg.title?`<div class="dlgtitle" id="dlgTitle">${esc(cfg.title)}</div>`:""}
        <div class="dlgmsg">${esc(cfg.msg)}</div>
        ${cfg.input?(cfg.multiline
          ?`<textarea id="dlgInput" aria-label="${esc(cfg.title||"Your answer")}" placeholder="${esc(cfg.placeholder||"")}"></textarea>`
          :`<input type="text" id="dlgInput" aria-label="${esc(cfg.title||"Your answer")}" placeholder="${esc(cfg.placeholder||"")}" style="width:100%">`):""}
        <div class="row" style="justify-content:flex-end">
          ${cfg.cancelText!==null?`<button class="btn sec" onclick="_dlgCancel()">${esc(cfg.cancelText||"Cancel")}</button>`:""}
          <button class="btn"${okStyle} onclick="_dlgOk()">${esc(cfg.okText||"OK")}</button>
        </div>
      </div>
    </div>`;
    const box = document.querySelector(".dlgbox"); if(box) trapFocus(box);
    const inEl = document.getElementById("dlgInput");
    if(inEl){
      inEl.value = cfg.def||""; inEl.focus(); if(!cfg.multiline) inEl.select();
      if(!cfg.multiline) inEl.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); _dlgOk(); } });
    } else {
      const btn = document.querySelector(".dlgbox .btn:last-child"); if(btn) btn.focus();
    }
  });
}
/* keep keyboard focus inside an open overlay (dialog/modal) until it closes */
function trapFocus(container){
  container.addEventListener("keydown", e=>{
    if(e.key!=="Tab") return;
    const list=[...container.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')]
      .filter(el=>!el.disabled && el.offsetParent!==null);
    if(!list.length) return;
    const first=list[0], last=list[list.length-1];
    if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
  });
}
function uiAlert(msg,o={}){ return _showDlg({msg,title:o.title,okText:o.okText,cancelText:null}); }
function uiConfirm(msg,o={}){ return _showDlg({msg,title:o.title,okText:o.okText||"OK",cancelText:o.cancelText||"Cancel",danger:o.danger}); }
function uiPrompt(msg,def,o={}){ return _showDlg({msg,title:o.title,input:true,multiline:o.multiline,def,placeholder:o.placeholder,okText:o.okText||"OK",cancelText:o.cancelText||"Cancel"}); }

function closeAuthModal(){ const m=document.getElementById("modal"); if(m) m.innerHTML=""; }
function authMsg(t,isErr){ const el=document.getElementById("authMsg"); if(el){ el.textContent=t; el.style.color = isErr?"var(--danger)":"var(--ok)"; } }
function niceAuthErr(msg){
  const m = /auth\/([a-z-]+)/.exec(msg||"");
  const map = {
    "wrong-password":"Wrong password.",
    "invalid-credential":"Wrong email or password.",
    "user-not-found":"No account with that email — try Create account.",
    "email-already-in-use":"That email already has an account — try Sign in instead.",
    "weak-password":"Password must be at least 6 characters.",
    "invalid-email":"That doesn't look like a valid email.",
    "too-many-requests":"Too many attempts — wait a bit and try again.",
  };
  return (m && map[m[1]]) || msg;
}
async function doGoogleSignIn(){ try{ await fb.signInGoogle(); closeAuthModal(); }catch(e){ authMsg(niceAuthErr(e.message),true); } }
async function doEmailSignIn(){
  const email=document.getElementById("authEmail").value.trim(), pass=document.getElementById("authPass").value;
  if(!email||!pass){ authMsg("Enter email and password.",true); return; }
  try{ await fb.signInEmail(email,pass); closeAuthModal(); }catch(e){ authMsg(niceAuthErr(e.message),true); }
}
async function doEmailSignUp(){
  const email=document.getElementById("authEmail").value.trim(), pass=document.getElementById("authPass").value;
  if(!email||!pass){ authMsg("Enter email and password.",true); return; }
  if(pass.length<6){ authMsg("Password must be at least 6 characters.",true); return; }
  try{ await fb.signUpEmail(email,pass); closeAuthModal(); }catch(e){ authMsg(niceAuthErr(e.message),true); }
}
async function doResetPassword(){
  const email=document.getElementById("authEmail").value.trim();
  if(!email){ authMsg("Enter your email above first.",true); return; }
  try{ await fb.resetPassword(email); authMsg("Reset email sent — check your inbox.",false); }catch(e){ authMsg(niceAuthErr(e.message),true); }
}

  view().innerHTML = `<h2>Settings</h2>
  ${pendingResume?`<div class="notice" style="margin-bottom:12px">${ico("arrowr")} Add your key below and save — we'll take you straight back to finish what you were doing.</div>`:""}

    <div class="row">

    <a href="https://www.youtube.com/t/terms" target="_blank" rel="noopener">YouTube Terms of Service</a> and the
    <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Google Privacy Policy</a>.

function saveKey(){
  apiKey = document.getElementById("keyIn").value.trim();
  store.set("ss_key",apiKey); cloudSave();
  if(apiKey && pendingResume){
    // seamless round-trip: skip the modal (it would just be another click to
    // dismiss right before we navigate away) and pick up exactly where they left off
    const r = pendingResume; pendingResume = null;
    go(r.route); r.run();
    return;
  }
  uiAlert(apiKey?"Key saved ✓":"Key cleared"); renderSet();
}
async function removeKey(){
  const ok = await uiConfirm("Remove your saved API key? Your creators and ideas stay exactly where they are, and you can add a new key anytime.", {title:"Remove key", okText:"Remove", danger:true});
  if(!ok) return;
  apiKey=""; store.del("ss_key"); cloudSave(); renderSet();
}
function clearCaches(){
  const keys=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith("ss_vids_")) keys.push(k); }
  keys.forEach(k=>localStorage.removeItem(k)); renderSet();
}
function exportAll(){
  const data = {creators, library, exported:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="creator-scout-backup.json"; a.click();
}
function importAll(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{
    const d = JSON.parse(r.result);
    if(d.creators){ creators = d.creators; creators.forEach(clearCreatorRemoved); }   // restore un-removes its creators
    if(d.library) library = normalizeLib(d.library);
    else if(d.remakes) library = migrateRemakes(d.remakes);
    Object.keys(library).forEach(id=>delete removed[id]);   // a restored backup un-removes its videos
    persist(); uiAlert("Backup restored ✓"); render();
  }catch(e){ uiAlert("Couldn't read that file.", {title:"Import failed"}); } };
  r.readAsText(f);
}

/* ---------- init ---------- */
/* Installable PWA: register the service worker (home-screen icon + offline shell). */
if("serviceWorker" in navigator){ window.addEventListener("load", ()=>{ navigator.serviceWorker.register("/sw.js").catch(()=>{}); }); }
/* Resume where the user last was. A brand-new visitor (no saved route) lands on
   the marketing home; a returning user reopens straight into the app instead of
   the landing page every time. `bootRedirect` covers the fresh-device signed-in
   case: if there's no saved route but Firebase restores a session, we send them
   into the app (see onUser) rather than showing them the front door. */
const savedRoute = store.get("ss_route", null);
route = {v: (savedRoute && RESUMABLE.has(savedRoute)) ? savedRoute : "home"};
let bootRedirect = !savedRoute;                 // only auto-resume signed-in users who have no local route yet
const deepVid = new URLSearchParams(location.search).get("v");
/* Friendly landing for mistyped URLs (hosting sends every path here) */
if(location.pathname !== "/" && !/index\.html$/.test(location.pathname)){
  history.replaceState(null, "", "/");
  render();
  uiAlert("That page doesn't exist, so we brought you home.", {title:"Page not found"});
} else if(deepVid && validVid(deepVid)){
  // shared link → open the video in our embedded player over the base view
  bootRedirect = false;
  history.replaceState(null, "", "/");          // clean the URL so a later refresh doesn't force it again
  render();
  playVid(deepVid);
} else {
  render();
}
</script>
<script type="module">
/* Optional Firebase layer — activates only when config.js is filled in */
try{
  const cfg = window.FIREBASE_CONFIG;
  if(!cfg || !cfg.apiKey || cfg.apiKey.startsWith("PASTE")){ window.onFirebaseReady(null); }
  else{
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
      createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const { getFirestore, doc, getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const app = initializeApp(cfg);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window.onFirebaseReady({
      signInGoogle: ()=>signInWithPopup(auth, new GoogleAuthProvider()),
      signInEmail: (email,pass)=>signInWithEmailAndPassword(auth,email,pass),
      signUpEmail: (email,pass)=>createUserWithEmailAndPassword(auth,email,pass),
      resetPassword: (email)=>sendPasswordResetEmail(auth,email),
      signOut: ()=>signOut(auth),
      onUser: (cb)=>onAuthStateChanged(auth, cb),
      load: async(uid)=>{ const s = await getDoc(doc(db,"users",uid)); return s.exists()? s.data() : null; },
      save: (uid,data)=>setDoc(doc(db,"users",uid), data, {merge:true}),
    });
  }
}catch(e){ console.warn("Firebase init failed:", e.message); window.onFirebaseReady(null); }
</script>
